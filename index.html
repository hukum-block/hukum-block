<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HÜKÜM-BLOCK | Professional Metaverse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.2/dist/peerjs.min.js"></script>
    <style>
        :root { --rbx-blue: #00A2FF; --rbx-dark: #232527; --rbx-green: #02B75A; --rbx-bg: #F2F4F5; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        body, html { height: 100%; width: 100%; background: var(--rbx-bg); }

        /* GİRİŞ SİSTEMI */
        #auth-screen { position: fixed; inset: 0; background: #191B1D; z-index: 50000; display: flex; align-items: center; justify-content: center; color: white; }
        .auth-card { background: #2E3033; padding: 40px; border-radius: 8px; width: 350px; text-align: center; border-top: 5px solid var(--rbx-blue); }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 4px; background: #3F4245; color: white; }
        .auth-card button { width: 100%; padding: 12px; background: var(--rbx-green); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status-msg { font-size: 12px; color: orange; margin-top: 10px; }

        /* ROBLOX TİPİ MENÜ (RESIMLERDEKI GIBI) */
        #app-shell { height: 100%; display: none; flex-direction: column; }
        .rbx-header { height: 45px; background: white; border-bottom: 1px solid #B8B8B8; display: flex; align-items: center; padding: 0 15px; z-index: 1000; }
        .rbx-logo { font-weight: 900; font-size: 22px; color: #111; margin-right: 25px; cursor: pointer; }
        .nav-item { margin: 0 10px; font-size: 14px; font-weight: 600; color: #444; cursor: pointer; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 15px; }
        .coin-btn { background: #F2F4F5; border: 1px solid #B8B8B8; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; }

        .rbx-body { display: flex; flex: 1; }
        .rbx-sidebar { width: 65px; background: white; border-right: 1px solid #B8B8B8; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 25px; }
        .side-icon { font-size: 22px; cursor: pointer; opacity: 0.6; color: #333; }
        .side-icon:hover { opacity: 1; color: var(--rbx-blue); }

        .main-content { flex: 1; padding: 25px; overflow-y: auto; background: var(--rbx-bg); }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid #B8B8B8; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .card-thumb { height: 140px; background: #393B3D; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; text-align: center; }

        /* OYUN ALANI VE MULTIPLAYER UI */
        #game-view { position: fixed; inset: 0; background: black; z-index: 10000; display: none; }
        #canvas-holder { width: 100%; height: 100%; }
        
        #game-ui-top { position: absolute; top: 10px; left: 10px; z-index: 10010; display: flex; gap: 10px; }
        .rbx-btn { background: rgba(0,0,0,0.5); color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }

        #chat-window { position: absolute; top: 55px; left: 10px; width: 320px; z-index: 10010; pointer-events: none; }
        #chat-log { height: 180px; overflow-y: auto; color: white; text-shadow: 1px 1px 2px black; font-size: 14px; margin-bottom: 5px; font-weight: 500; }
        #chat-input { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px; width: 100%; border-radius: 4px; pointer-events: auto; }

        #studio-shelf { position: absolute; top: 10px; right: 10px; z-index: 10010; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 5px; display: none; flex-direction: column; gap: 6px; }

        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); z-index: 10020; touch-action: none; display: none; }
        #joy-knob { width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; position: absolute; top: 30px; left: 30px; }

        #esc-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 30000; display: none; align-items: center; justify-content: center; }
        .esc-card { background: #232527; width: 350px; padding: 30px; border-radius: 8px; text-align: center; color: white; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="font-weight:900; letter-spacing:-1.5px;">HÜKÜM-BLOCK</h1>
        <input type="text" id="pasha-id" placeholder="Oyuncu İsmi">
        <input type="password" placeholder="Şifre">
        <button onclick="pashaAuth()">Kayıt Ol / Giriş</button>
        <p id="status-msg">Sunucuya bağlanılıyor...</p>
    </div>
</div>

<div id="app-shell">
    <div class="rbx-header">
        <div class="rbx-logo">HÜKÜM-BLOCK</div>
        <div class="nav-item">Ana Sayfa</div>
        <div class="nav-item">Avatar Shop</div>
        <div class="nav-right">
            <div class="coin-btn" onclick="dailyHC()">🪙 <span id="coin-txt">500</span> HÜKÜM Coin</div>
            <div id="user-display" style="font-weight:bold; font-size:14px; color:var(--rbx-blue);">Misafir</div>
        </div>
    </div>
    <div class="rbx-body">
        <div class="rbx-sidebar">
            <div class="side-icon" onclick="location.reload()">🏠</div>
            <div class="side-icon" onclick="openStudio()">⚒️</div>
            <div class="side-icon" onclick="sendHCCoin()">💸</div>
            <div class="side-icon" onclick="alert('BTF TA Grupları Yakında!')">👥</div>
        </div>
        <div class="main-content">
            <h2 style="margin-bottom:20px;">Oyunları Keşfet</h2>
            <div class="game-grid">
                <div class="card" onclick="joinServer('HudutKarakolu')">
                    <div class="card-thumb" style="background: linear-gradient(45deg, #1e272e, #485460);">HUDUT KARAKOLU</div>
                    <div style="padding:10px; font-weight:bold; font-size:13px;">BTF TA Askeri Operasyon [V2]</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="game-view">
    <div id="game-ui-top"><button class="rbx-btn" onclick="toggleEsc()">☰ MENÜ</button></div>
    <div id="chat-window">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="Sohbet et veya komut (/fly, /kick) yaz..." onkeypress="handleChat(event)">
    </div>
    <div id="studio-shelf">
        <button class="rbx-btn" onclick="spawn('box')">📦 PART</button>
        <button class="rbx-btn" onclick="spawn('flag')">🚩 TÜRK BAYRAĞI</button>
    </div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="canvas-holder"></div>
</div>

<div id="esc-overlay">
    <div class="esc-card">
        <h2 style="margin-bottom:25px;">HÜKÜM-BLOCK</h2>
        <button onclick="toggleEsc()" style="width:100%; padding:12px; background:var(--rbx-green); color:white; border:none; border-radius:4px; font-weight:bold; margin-bottom:10px;">OYUNA DÖN</button>
        <button onclick="location.reload()" style="width:100%; padding:12px; background:#d63031; color:white; border:none; border-radius:4px; font-weight:bold;">OYUNDAN AYRIL</button>
    </div>
</div>

<script>
    // --- MULTIPLAYER & SİSTEM ALTYAPISI ---
    let pashaData = { name: "Eymen", coins: 500, lastTask: 0 };
    let peer, connections = {}, currentServerId;
    let localPlayerId, scene, camera, renderer, character, joyMove = {x:0, z:0}, otherPlayers = {};

    // 1. PeerJS Bağlantısını Kur
    function initPeer(name) {
        // Rastgele bir ID oluştur veya ismi kullan
        localPlayerId = 'HKM_' + name + '_' + Math.floor(Math.random()*1000);
        peer = new Peer(localPlayerId); 

        peer.on('open', (id) => {
            document.getElementById('status-msg').innerText = "Bağlandı: " + name;
            document.getElementById('status-msg').style.color = "#02B75A";
            pashaData.name = name;
            document.getElementById('user-display').innerText = name;
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';
            }, 1000);
        });

        peer.on('error', (err) => {
            alert("Bağlantı hatası! Lütfen farklı bir isim dene.");
            location.reload();
        });

        // Gelen veri bağlantılarını dinle
        peer.on('connection', (conn) => {
            conn.on('data', (data) => handleNetworkData(conn.peer, data));
        });
    }

    function pashaAuth() {
        let name = document.getElementById('pasha-id').value;
        if(name && name.length > 2) {
            document.getElementById('status-msg').innerText = "Bağlanılıyor...";
            initPeer(name);
        } else { alert("İsim çok kısa aslanım!"); }
    }

    // 2. Bir Sunucuya/Oda'ya Katıl
    function joinServer(serverId) {
        currentServerId = serverId;
        document.getElementById('app-shell').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('joy-base').style.display = 'block';

        if(!scene) init3DEngine();

        // Chat'e bilgi ver
        addChatLog("HÜKÜM", "Sunucuya bağlanıldı: " + serverId + ". Diğer oyuncuların sana bağlanması için ismini paylaş.");

        // Pozisyon güncelleme döngüsünü başlat
        setInterval(broadcastPosition, 100); 
    }

    // 3. Ağ Verilerini Yönet (Multiplayer Mantığı)
    function handleNetworkData(senderId, data) {
        // Eğer yeni bir oyuncuysa 3D modelini oluştur
        if(!otherPlayers[senderId] && data.type === 'pos') {
            createOtherPlayer(senderId, data.name);
        }

        if(data.type === 'pos') {
            otherPlayers[senderId].position.set(data.x, data.y, data.z);
        } else if (data.type === 'chat') {
            addChatLog(data.name, data.msg);
        }
    }

    // Pozisyonunu diğerlerine yayınla
    function broadcastPosition() {
        if(!character || !peer) return;
        let pos = {
            type: 'pos',
            name: pashaData.name,
            x: character.position.x,
            y: character.position.y,
            z: character.position.z
        };
        // Mevcut tüm bağlantılara gönder
        for (let id in connections) {
            connections[id].send(pos);
        }
    }

    // Diğer oyuncuya bağlan (Manuel arkadaş ekleme/join gibi)
    function connectToPlayer(targetId) {
        if(connections[targetId] || targetId === localPlayerId) return;
        let conn = peer.connect(targetId);
        connections[targetId] = conn;
        conn.on('open', () => {
            addChatLog("Sistem", targetId.split('_')[1] + " ile bağlantı kuruldu.");
        });
        conn.on('data', (data) => handleNetworkData(targetId, data));
    }

    // --- 3D MOTOR & KARAKTER (THREE.JS) ---
    function init3DEngine() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-holder').appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
        const grid = new THREE.GridHelper(1000, 100, 0x000000, 0x000000); // Roblox Grass Grid
        scene.add(grid);

        // --- GERÇEK 3D KARAKTER MODELİ (R15 TARZI) ---
        character = new THREE.Group();
        const matBody = new THREE.MeshPhongMaterial({color: 0x00A2FF});
        const matSkin = new THREE.MeshPhongMaterial({color: 0xFFDBAC});

        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.6, 0.6), matBody);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.9), matSkin);
        head.position.y = 1.3;
        const armL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.6, 0.4), matSkin);
        armL.position.set(-0.9, 0, 0);
        const armR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.6, 0.4), matSkin);
        armR.position.set(0.9, 0, 0);
        const legL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.6, 0.5), matBody);
        legL.position.set(-0.35, -1.6, 0);
        const legR = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.6, 0.5), matBody);
        legR.position.set(0.35, -1.6, 0);

        character.add(torso, head, armL, armR, legL, legR);
        character.position.y = 1.6;
        scene.add(character);

        camera.position.set(0, 10, 20);
        camera.lookAt(character.position);
        
        setupJoystick();
        animate();
    }

    function createOtherPlayer(id, name) {
        // Karakterin aynısını oluştur
        let p = character.clone();
        p.children[1].material = new THREE.MeshPhongMaterial({color: 0xee5253}); // Farklı kafa rengi
        otherPlayers[id] = p;
        scene.add(p);
        addChatLog("Sistem", name + " oyuna katıldı.");
    }

    function animate() {
        requestAnimationFrame(animate);
        character.position.x += joyMove.x * 0.25;
        character.position.z += joyMove.z * 0.25;
        camera.position.x = character.position.x;
        camera.position.z = character.position.z + 20;
        renderer.render(scene, camera);
    }

    // --- KONTROLLER, CHAT & EKONOMİ ---
    function handleChat(e) {
        if(e.key === 'Enter') {
            let val = document.getElementById('chat-input').value;
            if(!val) return;

            // Komut sistemi
            if(val.startsWith('/join ')) {
                connectToPlayer(val.split(' ')[1]);
            } else if (val === '/fly') {
                alert("HÜKÜM STUDIO Yetkisi Gerekli!");
            } else {
                // Mesajı yayınla
                addChatLog(pashaData.name, val);
                let msg = { type: 'chat', name: pashaData.name, msg: val };
                for (let id in connections) { connections[id].send(msg); }
            }
            document.getElementById('chat-input').value = "";
        }
    }

    function addChatLog(name, msg) {
        const log = document.getElementById('chat-log');
        log.innerHTML += `<div><b>${name}:</b> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function dailyHC() {
        let now = Date.now();
        if(now - pashaData.lastTask > 20000) {
            let win = Math.floor(Math.random()*401)+100;
            pashaData.coins += win;
            document.getElementById('coin-txt').innerText = pashaData.coins;
            pashaData.lastTask = now;
            alert(`${win} HÜKÜM Coin kazandın Paşa!`);
        } else { alert("Görevler hazırlanıyor, bekle!"); }
    }

    function sendHCCoin() {
        let target = prompt("Coin göndermek istediğin oyuncu ismi:");
        if(target) {
            let amount = prompt("Miktar (HC):");
            if(amount && amount <= pashaData.coins) {
                pashaData.coins -= parseInt(amount);
                document.getElementById('coin-txt').innerText = pashaData.coins;
                alert(`${target} kişisine ${amount} HC gönderildi!`);
            }
        }
    }

    function openStudio() {
        joinServer("HukumStudio_V3");
        document.getElementById('studio-shelf').style.display = 'flex';
    }

    function spawn(type) {
        let obj;
        if(type=='box') obj = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshPhongMaterial({color: 0x95a5a6}));
        if(type=='flag') obj = new THREE.Mesh(new THREE.BoxGeometry(0.5, 8, 0.5), new THREE.MeshPhongMaterial({color: 0xffffff}));
        obj.position.set(character.position.x + 8, 2, character.position.z);
        scene.add(obj);
    }

    function setupJoystick() {
        const base = document.getElementById('joy-base');
        const knob = document.getElementById('joy-stick');
        base.addEventListener('touchstart', (e) => handleMove(e));
        base.addEventListener('touchmove', (e) => handleMove(e));
        base.addEventListener('touchend', () => { joyMove = {x:0, z:0}; knob.style.top='30px'; knob.style.left='30px'; });

        function handleMove(e) {
            e.preventDefault(); let t = e.touches[0]; let r = base.getBoundingClientRect();
            let x = t.clientX - r.left - 55; let z = t.clientY - r.top - 55;
            let d = Math.sqrt(x*x + z*z); if(d > 45) { x *= 45/d; z *= 45/d; }
            knob.style.left = (x + 30) + 'px'; knob.style.top = (z + 30) + 'px';
            joyMove.x = x/45; joyMove.z = z/45;
        }

        window.addEventListener('keydown', (e) => {
            if(e.key == 'w') joyMove.z = -1; if(e.key == 's') joyMove.z = 1;
            if(e.key == 'a') joyMove.x = -1; if(e.key == 'd') joyMove.x = 1;
        });
        window.addEventListener('keyup', () => joyMove={x:0, z:0});
    }

    function toggleEsc() {
        let esc = document.getElementById('esc-overlay');
        esc.style.display = (esc.style.display == 'flex' ? 'none' : 'flex');
    }
</script>
</body>
</html>
