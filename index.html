<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HÜKÜM-BLOCK V7 | Pro Studio & Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --rbx-blue: #00A2FF; --rbx-dark: #232527; --rbx-bg: #191B1D; --rbx-green: #02B75A; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; touch-action: none; color: white; }

        /* ENGINE OVERLAY */
        #studio-ui { position: absolute; inset: 0; display: grid; grid-template-columns: 240px 1fr 240px; grid-template-rows: 40px 1fr 180px; pointer-events: none; z-index: 10; }
        header { grid-column: 1 / -1; background: var(--rbx-dark); border-bottom: 1px solid #444; display: flex; align-items: center; padding: 0 15px; pointer-events: auto; }
        
        /* EXPLORER (Hiyerarşi) */
        #explorer { background: var(--rbx-dark); border-right: 1px solid #444; padding: 10px; pointer-events: auto; }
        .explorer-item { font-size: 12px; padding: 5px; cursor: pointer; display: flex; align-items: center; gap: 5px; border-radius: 3px; }
        .explorer-item:hover { background: #333; }
        
        /* PROPERTIES (Ruh Hali) */
        #properties { background: var(--rbx-dark); border-left: 1px solid #444; padding: 10px; pointer-events: auto; }
        .prop-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        
        /* GAME VIEWPORT */
        #viewport { grid-column: 2 / 3; position: relative; }
        
        /* CHAT & OUTPUT */
        #output { grid-column: 1 / -1; background: #111; border-top: 1px solid #444; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 12px; pointer-events: auto; }

        /* CONTROLS */
        #joystick { position: absolute; bottom: 200px; left: 260px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; pointer-events: auto; }
        #stick { width: 40px; height: 40px; background: white; border-radius: 50%; position: absolute; top: 30px; left: 30px; opacity: 0.5; }

        .btn { background: var(--rbx-blue); border: none; color: white; padding: 5px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-green { background: var(--rbx-green); }
    </style>
</head>
<body>

<div id="studio-ui">
    <header>
        <span style="font-weight:900; color:var(--rbx-blue); margin-right:20px;">HÜKÜM STUDIO V7</span>
        <button class="btn btn-green" onclick="instantiate('Part')">Insert Part</button>
        <button class="btn" style="margin-left:10px;" onclick="togglePlay()">PLAY</button>
        <div style="margin-left:auto;">🪙 <span id="coin">1000</span> Robux</div>
    </header>

    <div id="explorer">
        <b style="font-size:11px; color:#888;">EXPLORER</b>
        <div class="explorer-item">📂 Workspace</div>
        <div id="workspace-list" style="padding-left:15px;">
            <div class="explorer-item">👤 Humanoid (Player)</div>
        </div>
        <div class="explorer-item">📂 ReplicatedStorage</div>
        <div class="explorer-item">📂 ServerScriptService</div>
    </div>

    <div id="viewport">
        </div>

    <div id="properties">
        <b style="font-size:11px; color:#888;">PROPERTIES</b>
        <div id="prop-list">
            <div class="prop-row"><span>Name</span> <span>Workspace</span></div>
            <div class="prop-row"><span>Anchored</span> <span>true</span></div>
            <div class="prop-row"><span>CFrame</span> <span>0, 0, 0</span></div>
        </div>
    </div>

    <div id="output">
        <div style="color:#02B75A;">[SYSTEM]: HÜKÜM Engine V7 Initialized. Luau Compiler ready.</div>
    </div>
</div>

<div id="joystick"><div id="stick"></div></div>

<script>
    let scene, camera, renderer, player, moveDir = {x:0, z:0};
    let objects = [];
    let isPlaying = false;

    // --- ENGINE SETUP ---
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);
        
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 480) / (window.innerHeight - 220), 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 480, window.innerHeight - 220);
        document.getElementById('viewport').appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(light);
        
        const grid = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
        scene.add(grid);

        // Character (HumanoidRootPart)
        player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.6), new THREE.MeshPhongMaterial({color: 0x00A2FF}));
        player.add(body);
        player.position.y = 0.75;
        scene.add(player);

        camera.position.set(0, 10, 15);
        camera.lookAt(player.position);

        setupControls();
        animate();
    }

    // --- SCRIPTING & LOGIC (Instance.new) ---
    function instantiate(type) {
        if(type === 'Part') {
            const geo = new THREE.BoxGeometry(2, 2, 2);
            const mat = new THREE.MeshPhongMaterial({color: Math.random() * 0xffffff});
            const part = new THREE.Mesh(geo, mat);
            part.position.set(Math.random()*10 - 5, 1, Math.random()*10 - 5);
            scene.add(part);
            objects.push(part);
            
            // Update Explorer
            const list = document.getElementById('workspace-list');
            const item = document.createElement('div');
            item.className = 'explorer-item';
            item.innerHTML = `🧊 Part_${objects.length}`;
            list.appendChild(item);
            
            print(`Instance.new("Part"): Part_${objects.length} created.`);
        }
    }

    function print(msg) {
        const out = document.getElementById('output');
        out.innerHTML += `<div>> ${msg}</div>`;
        out.scrollTop = out.scrollHeight;
    }

    function togglePlay() {
        isPlaying = !isPlaying;
        print(isPlaying ? "Simulation started." : "Simulation stopped.");
        scene.background = new THREE.Color(isPlaying ? 0x87CEEB : 0x1e1e1e);
    }

    // --- PHYSICS & RENDER LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        
        if(isPlaying) {
            player.position.x += moveDir.x * 0.2;
            player.position.z += moveDir.z * 0.2;
            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 10, player.position.z + 15), 0.1);
            camera.lookAt(player.position);
        }

        renderer.render(scene, camera);
    }

    // --- CONTROLS ---
    function setupControls() {
        const joy = document.getElementById('joystick'), stick = document.getElementById('stick');
        joy.addEventListener('touchmove', (e) => {
            const t = e.touches[0], r = joy.getBoundingClientRect();
            let dx = t.clientX - r.left - 50, dy = t.clientY - r.top - 50;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > 40) { dx *= 40/dist; dy *= 40/dist; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            moveDir.x = dx / 40; moveDir.z = dy / 40;
        });
        joy.addEventListener('touchend', () => {
            stick.style.transform = `translate(0px, 0px)`;
            moveDir = {x:0, z:0};
        });
    }

    init();
</script>
</body>
</html>
